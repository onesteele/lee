<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Vanguard Retail Integrity Law</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { navy: '#0f172a', slate: '#334155', light: '#f8fafc', accent: '#3b82f6', gold: '#d4af37', alert: '#ef4444' } }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .hero-bg { background-color: #0f172a; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="bg-brand-light text-slate-800 overflow-x-hidden">

    <!-- NAVIGATION -->
    <nav id="navbar" class="fixed w-full z-50 py-6 transition-all duration-300 bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold tracking-tight text-brand-navy flex items-center gap-2">
                    <div class="w-2 h-2 bg-brand-accent rounded-full"></div>
                    VANGUARD
                </a>
                <div class="hidden md:flex space-x-8 text-sm font-medium text-slate-600">
                    <a href="index.html" class="hover:text-brand-accent transition-colors">Home</a>
                    <a href="services.html" class="hover:text-brand-accent transition-colors">Practice Areas</a>
                    <a href="about.html" class="hover:text-brand-accent transition-colors">About Firm</a>
                    <a href="contact.html" class="text-brand-accent font-bold">Contact</a>
                </div>
                <a href="contact.html" class="hidden md:block px-6 py-2.5 bg-brand-navy text-white text-sm font-medium rounded hover:bg-slate-800 transition-all shadow-lg">
                    Consult Counsel
                </a>
            </div>
        </div>
    </nav>

    <!-- HEADER -->
    <header class="hero-bg min-h-[50vh] flex items-center relative pt-32 pb-12">
        <div class="max-w-7xl mx-auto px-6 w-full text-center">
            <h1 class="text-5xl font-bold text-white mb-6">Start Your Defense</h1>
            <p class="text-slate-300">Request a consultation today.</p>
        </div>
    </header>

    <!-- FORM -->
    <section class="py-24 bg-brand-light">
        <div class="max-w-3xl mx-auto px-6">
            <div class="bg-white p-8 rounded-2xl shadow-xl">
                <form class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Business Name</label>
                            <input type="text" class="w-full bg-slate-50 border border-slate-200 rounded p-3 focus:outline-none focus:border-brand-accent">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Email Address</label>
                            <input type="email" class="w-full bg-slate-50 border border-slate-200 rounded p-3 focus:outline-none focus:border-brand-accent">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Inquiry Type</label>
                        <select class="w-full bg-slate-50 border border-slate-200 rounded p-3 focus:outline-none focus:border-brand-accent">
                            <option>General Inquiry</option>
                            <option>Chargeback Defense</option>
                            <option>Contract Breach</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Message</label>
                        <textarea rows="4" class="w-full bg-slate-50 border border-slate-200 rounded p-3 focus:outline-none focus:border-brand-accent"></textarea>
                    </div>
                    <button class="w-full bg-brand-navy text-white font-bold py-4 rounded hover:bg-slate-800 transition-colors">
                        Submit Request
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-black text-slate-500 py-12 border-t border-slate-800 text-sm">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h3 class="text-white text-lg font-bold mb-4">Vanguard Retail Integrity Law</h3>
            <p>1-800-VANGUARD</p>
        </div>
    </footer>

    <script>
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) { navbar.classList.add('shadow-md', 'bg-white/95'); navbar.classList.remove('py-6'); navbar.classList.add('py-4'); } 
            else { navbar.classList.remove('shadow-md'); navbar.classList.add('py-6'); navbar.classList.remove('py-4'); }
        });
    </script>
</body>
</html>
